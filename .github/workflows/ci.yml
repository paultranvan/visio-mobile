name: CI

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'ios/**'
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
  pull_request:
    branches: [main]

jobs:
  test-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libglib2.0-dev libva-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: test
      - name: Install LiveKit server
        run: |
          curl -sSL https://get.livekit.io | bash
          livekit-server --dev &
          sleep 3
      - name: Run unit tests
        run: cargo test -p visio-core --lib
      - name: Run integration tests
        run: cargo test -p visio-core --test integration_livekit
        env:
          LIVEKIT_URL: ws://localhost:7880
          LIVEKIT_API_KEY: devkey
          LIVEKIT_API_SECRET: secret

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libglib2.0-dev libva-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: lint
      - name: Check formatting
        run: cargo fmt -p visio-core -- --check
      - name: Clippy
        run: cargo clippy -p visio-core -- -D warnings
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Kotlin lint
        working-directory: android
        run: ./gradlew ktlintCheck

  test-android-ui:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          script: cd android && ./gradlew connectedAndroidTest
