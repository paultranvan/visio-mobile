name: Build & Distribute Android

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: "Release notes for testers"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: android-arm64

      - name: Set up Android NDK
        uses: android-actions/setup-android@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Install system dependencies for UniFFI bindgen
        run: sudo apt-get update && sudo apt-get install -y libglib2.0-dev libva-dev

      - name: Compile Rust native libraries
        run: cargo ndk -t arm64-v8a build -p visio-ffi -p visio-video --release

      - name: Generate UniFFI Kotlin bindings
        run: bash scripts/generate-bindings.sh kotlin

      - name: Copy .so files to jniLibs
        run: |
          rm -rf android/app/src/main/jniLibs/arm64-v8a
          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          cp target/aarch64-linux-android/release/libvisio_ffi.so android/app/src/main/jniLibs/arm64-v8a/
          cp target/aarch64-linux-android/release/libvisio_video.so android/app/src/main/jniLibs/arm64-v8a/
          LIBCXX=$(find $ANDROID_NDK_HOME -name "libc++_shared.so" -path "*/aarch64-linux-android/*" | head -1)
          if [ -n "$LIBCXX" ]; then cp "$LIBCXX" android/app/src/main/jniLibs/arm64-v8a/; fi

      - name: Copy libwebrtc.jar
        run: |
          mkdir -p android/app/libs
          WEBRTC_JAR=$(find target -name "libwebrtc.jar" -path "*/android-arm64-release/*" 2>/dev/null | head -1)
          if [ -n "$WEBRTC_JAR" ]; then
            cp "$WEBRTC_JAR" android/app/libs/
          else
            echo "::error::libwebrtc.jar not found"
            exit 1
          fi

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

      - name: Decode Firebase service account
        run: |
          echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_BASE64 }}" | base64 -d > /tmp/firebase-sa.json

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Build & distribute via Fastlane
        working-directory: android
        env:
          KEYSTORE_PATH: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-sa.json
          VERSION_CODE: ${{ github.run_number }}
          RELEASE_NOTES: ${{ github.event.inputs.release_notes }}
        run: bundle exec fastlane distribute

      - name: Find built APK
        id: find-apk
        if: always()
        run: |
          APK=$(find android/app/build/outputs -name "*.apk" -type f | head -1)
          if [ -n "$APK" ]; then
            echo "apk_path=$APK" >> $GITHUB_OUTPUT
            echo "apk_name=$(basename $APK)" >> $GITHUB_OUTPUT
            echo "Found APK: $APK"
          else
            echo "No APK found"
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: steps.find-apk.outputs.apk_path != ''
        with:
          name: android-apk
          path: ${{ steps.find-apk.outputs.apk_path }}

      - name: Create GitHub Release with APK
        if: steps.find-apk.outputs.apk_path != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="build-${{ github.run_number }}"
          NOTES="${{ github.event.inputs.release_notes }}"
          if [ -z "$NOTES" ]; then
            NOTES="Build #${{ github.run_number }} from $(date -u +%Y-%m-%d)"
          fi
          gh release create "$TAG" \
            "${{ steps.find-apk.outputs.apk_path }}" \
            --title "Android Build #${{ github.run_number }}" \
            --notes "$NOTES" \
            --prerelease
