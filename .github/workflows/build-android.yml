name: Build & Distribute Android

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_notes:
        description: "Release notes for testers"
        required: false
        default: ""

jobs:
  test-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libglib2.0-dev libva-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: test
      - name: Install LiveKit server
        run: |
          curl -sSL https://get.livekit.io | bash
          livekit-server --dev &
          sleep 3
      - name: Run unit tests
        run: cargo test -p visio-core --lib
      - name: Run integration tests
        run: cargo test -p visio-core --test integration_livekit
        env:
          LIVEKIT_URL: ws://localhost:7880
          LIVEKIT_API_KEY: devkey
          LIVEKIT_API_SECRET: secret

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libglib2.0-dev libva-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: lint
      - name: Check formatting
        run: cargo fmt -p visio-core -- --check
      - name: Clippy
        run: cargo clippy -p visio-core -- -D warnings
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Kotlin lint
        working-directory: android
        run: ./gradlew ktlintCheck

  build-android:
    if: github.event_name == 'workflow_dispatch'
    needs: [test-rust, lint]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: android-arm64

      - name: Set up Android NDK
        uses: android-actions/setup-android@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Compile Rust native libraries
        run: cargo ndk -t arm64-v8a build -p visio-ffi -p visio-video --release

      - name: Copy .so files to jniLibs
        run: |
          rm -rf android/app/src/main/jniLibs/arm64-v8a
          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          cp target/aarch64-linux-android/release/libvisio_ffi.so android/app/src/main/jniLibs/arm64-v8a/
          cp target/aarch64-linux-android/release/libvisio_video.so android/app/src/main/jniLibs/arm64-v8a/

      - name: Copy libwebrtc.jar
        run: |
          mkdir -p android/app/libs
          WEBRTC_JAR=$(find target -name "libwebrtc.jar" -path "*/android-arm64-release/*" 2>/dev/null | head -1)
          if [ -n "$WEBRTC_JAR" ]; then
            cp "$WEBRTC_JAR" android/app/libs/
          else
            echo "::error::libwebrtc.jar not found"
            exit 1
          fi

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

      - name: Decode Firebase service account
        run: |
          echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_BASE64 }}" | base64 -d > /tmp/firebase-sa.json

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Build & distribute via Fastlane
        working-directory: android
        env:
          KEYSTORE_PATH: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-sa.json
          VERSION_CODE: ${{ github.run_number }}
          RELEASE_NOTES: ${{ github.event.inputs.release_notes }}
        run: bundle exec fastlane distribute

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-apk
          path: android/app/build/outputs/apk/release/*.apk

  test-android-ui:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          script: cd android && ./gradlew connectedAndroidTest
