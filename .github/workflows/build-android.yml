name: Build & Distribute Android

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: "Release notes for testers"
        required: false
        default: ""

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Set up Android NDK
        uses: android-actions/setup-android@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Compile Rust native libraries
        run: cargo ndk -t arm64-v8a build -p visio-ffi -p visio-video --release

      - name: Copy .so files to jniLibs
        run: |
          rm -rf android/app/src/main/jniLibs/arm64-v8a
          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          cp target/aarch64-linux-android/release/libvisio_ffi.so android/app/src/main/jniLibs/arm64-v8a/
          cp target/aarch64-linux-android/release/libvisio_video.so android/app/src/main/jniLibs/arm64-v8a/

      - name: Copy libwebrtc.jar
        run: |
          mkdir -p android/app/libs
          WEBRTC_JAR=$(find target/release/build -name "libwebrtc.jar" -path "*/android-arm64-release/*" 2>/dev/null | head -1)
          if [ -n "$WEBRTC_JAR" ]; then
            cp "$WEBRTC_JAR" android/app/libs/
          else
            echo "::error::libwebrtc.jar not found"
            exit 1
          fi

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Build & distribute via Fastlane
        working-directory: android
        env:
          KEYSTORE_PATH: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PATH }}
          VERSION_CODE: ${{ github.run_number }}
        run: bundle exec fastlane distribute

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-apk
          path: android/app/build/outputs/apk/release/*.apk
